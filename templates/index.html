<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 뉴스 브리핑 | 통신·IT 동향</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f7;
    --bg-tertiary: #fafafa;
    --border: #e5e5e7;
    --border-light: #f0f0f2;
    --text-primary: #1d1d1f;
    --text-secondary: #6e6e73;
    --text-tertiary: #aeaeb2;
    --accent: #0071e3;
    --accent-soft: #e8f1fb;
    --green: #34c759;
    --green-soft: #e9f8ee;
    --orange: #ff9500;
    --orange-soft: #fff4e5;
    --red: #ff3b30;
    --red-soft: #fff0ef;
    --col-lgu: #e8007d;
    --col-kt: #e1001e;
    --col-skt: #e2007c;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

  body {
    background: var(--bg-secondary);
    font-family: 'Noto Sans KR', 'Inter', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    padding: 32px 16px 60px;
  }

  /* ── LOADING ── */
  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { font-size: 13px; color: var(--text-tertiary); font-weight: 400; letter-spacing: -0.01em; }

  /* ── MAIN CONTAINER ── */
  .report {
    max-width: 880px;
    margin: 0 auto;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .report.visible { display: flex; animation: fadeUp 0.35s ease both; }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* ── HEADER ── */
  .report-header {
    background: var(--bg);
    border-radius: var(--radius);
    padding: 36px 40px 28px;
    border: 1px solid var(--border-light);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .header-title {
    font-size: clamp(26px, 4vw, 36px);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text-primary);
    line-height: 1.1;
  }
  .header-title span { color: var(--accent); }
  .header-meta {
    text-align: right;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-end;
    flex-shrink: 0;
    margin-left: 20px;
  }
  .date-badge {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .time-badge {
    font-size: 11px;
    color: var(--text-tertiary);
    font-weight: 400;
  }
  .refresh-btn {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .18s;
    font-family: inherit;
    letter-spacing: -0.01em;
    margin-top: 4px;
  }
  .refresh-btn:hover { background: var(--border); color: var(--text-primary); }

  /* ── KEYWORD PILLS ── */
  .keyword-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding-top: 16px;
    border-top: 1px solid var(--border-light);
  }
  .kw-pill {
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 12px;
    border-radius: 20px;
    letter-spacing: -0.01em;
  }

  /* ── GENERATING NOTICE ── */
  .generating-notice {
    background: var(--accent-soft);
    border: 1px solid #c0d8f5;
    border-radius: var(--radius-sm);
    padding: 14px 20px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    display: none;
    text-align: center;
  }

  /* ── SECTION CARD ── */
  .card {
    background: var(--bg);
    border-radius: var(--radius);
    border: 1px solid var(--border-light);
    overflow: hidden;
  }
  .card-header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-num {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }

  /* ── TELCO TABLE ── */
  .telco-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .telco-table th {
    padding: 11px 16px;
    font-weight: 600;
    font-size: 12px;
    text-align: left;
    letter-spacing: -0.01em;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .telco-table th.lgu { color: var(--col-lgu); }
  .telco-table th.kt  { color: var(--col-kt); }
  .telco-table th.skt { color: var(--col-skt); }
  .telco-table td {
    padding: 13px 16px;
    vertical-align: top;
    border-bottom: 1px solid var(--border-light);
    line-height: 1.65;
    color: var(--text-primary);
  }
  .telco-table tr:last-child td { border-bottom: none; }
  .telco-table tr:hover td { background: var(--bg-secondary); }
  .telco-table td.row-label {
    font-weight: 600;
    font-size: 11.5px;
    color: var(--text-secondary);
    white-space: nowrap;
    background: var(--bg-tertiary);
    border-right: 1px solid var(--border-light);
    width: 64px;
  }
  .none-cell { color: var(--text-tertiary); font-style: italic; font-size: 12px; }

  /* ── SUMMARY LIST ── */
  .summary-list { padding: 4px 0; }
  .summary-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border-light);
    transition: background .15s;
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item:hover { background: var(--bg-secondary); }
  .summary-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
  }
  .summary-text { font-size: 13.5px; line-height: 1.7; color: var(--text-primary); letter-spacing: -0.01em; }

  /* ── COMPANY GRID ── */
  .company-grid { display: grid; grid-template-columns: 88px 1fr 1fr; }
  .cg-head {
    padding: 10px 16px;
    font-size: 11px; font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.01em;
  }
  .cg-head:not(:last-child) { border-right: 1px solid var(--border-light); }
  .cg-name {
    padding: 13px 16px;
    font-size: 12.5px; font-weight: 600;
    color: var(--text-primary);
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border-light);
    border-right: 1px solid var(--border-light);
    display: flex; align-items: flex-start;
    letter-spacing: -0.02em;
  }
  .cg-cell {
    padding: 13px 16px;
    font-size: 13px; line-height: 1.65;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border-light);
    letter-spacing: -0.01em;
  }
  .cg-cell:not(:last-child) { border-right: 1px solid var(--border-light); }
  .company-grid > *:nth-last-child(-n+3) { border-bottom: none; }

  /* ── QUALITY GRID ── */
  .quality-grid { display: grid; grid-template-columns: 96px 100px 1fr; }
  .qg-head {
    padding: 10px 16px;
    font-size: 11px; font-weight: 600;
    color: var(--text-secondary);
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    letter-spacing: -0.01em;
  }
  .qg-head:not(:last-child) { border-right: 1px solid var(--border-light); }
  .qg-type {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border-light);
    border-right: 1px solid var(--border-light);
    display: flex; align-items: center;
  }
  .qg-company {
    padding: 13px 16px;
    font-size: 13px; font-weight: 600;
    border-bottom: 1px solid var(--border-light);
    border-right: 1px solid var(--border-light);
    display: flex; align-items: center;
    letter-spacing: -0.02em;
  }
  .qg-desc {
    padding: 13px 16px;
    font-size: 13px; line-height: 1.65;
    border-bottom: 1px solid var(--border-light);
    color: var(--text-primary);
    display: flex; align-items: center;
    letter-spacing: -0.01em;
  }
  .quality-grid > *:nth-last-child(-n+3) { border-bottom: none; }
  .badge {
    font-size: 11px; font-weight: 500;
    padding: 3px 9px; border-radius: 20px;
    white-space: nowrap; letter-spacing: -0.01em;
  }
  .badge-improve  { background: var(--green-soft);   color: #1a7d35; }
  .badge-security { background: var(--orange-soft);  color: #a05500; }
  .badge-failure  { background: var(--red-soft);     color: #b0140c; }
  .badge-none     { background: var(--bg-secondary); color: var(--text-tertiary); }

  /* ── AI NEWS ── */
  .ai-news-list { padding: 4px 0; }
  .ai-card {
    display: block;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border-light);
    text-decoration: none;
    color: inherit;
    transition: background .15s;
  }
  .ai-card:last-child { border-bottom: none; }
  .ai-card:hover { background: var(--bg-secondary); }
  .ai-card-inner { display: flex; gap: 16px; align-items: flex-start; }
  .ai-card-content { flex: 1; min-width: 0; }
  .ai-card-title {
    font-size: 14px; font-weight: 600;
    line-height: 1.45; margin-bottom: 10px;
    letter-spacing: -0.02em;
    color: var(--text-primary);
  }
  .ai-card.has-url .ai-card-title { color: var(--accent); }
  .ai-card-bullets { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .ai-card-bullet {
    font-size: 12.5px; line-height: 1.6;
    color: var(--text-secondary); letter-spacing: -0.01em;
  }
  .ai-card-source {
    font-size: 11px; font-weight: 500;
    color: var(--text-tertiary);
    display: flex; align-items: center; gap: 5px;
    letter-spacing: -0.01em;
  }
  .ai-card-source::before { content: 'from.'; color: var(--accent); font-weight: 600; }
  .ai-card-arrow {
    font-size: 18px; color: var(--text-tertiary);
    flex-shrink: 0; margin-top: 0;
    transition: transform .15s, color .15s;
    line-height: 1;
  }
  .ai-card.has-url:hover .ai-card-arrow { color: var(--accent); transform: translateX(3px); }

  /* ── FOOTER ── */
  .report-footer {
    text-align: center;
    padding: 8px;
    font-size: 11px;
    color: var(--text-tertiary);
    letter-spacing: -0.01em;
  }

  @media(max-width:600px) {
    body { padding: 16px 12px 40px; }
    .report-header { padding: 24px 20px 20px; }
    .header-top { flex-direction: column; gap: 12px; }
    .header-meta { text-align: left; align-items: flex-start; margin-left: 0; }
    .card-header { padding: 16px 20px 14px; }
    .summary-item, .ai-card { padding: 13px 20px; }
    .telco-table th, .telco-table td { padding: 9px 10px; font-size: 11.5px; }
    .company-grid { grid-template-columns: 68px 1fr 1fr; }
    .quality-grid { grid-template-columns: 80px 88px 1fr; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>브리핑 불러오는 중…</p>
</div>

<div class="report" id="report">

  <div class="generating-notice" id="generatingNotice">
    ⏳ 오늘의 AI 브리핑을 생성 중입니다. 잠시 후 자동으로 새로고침됩니다…
  </div>

  <!-- HEADER -->
  <div class="report-header">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">사내 AI 뉴스 브리핑 · Daily Edition</div>
        <h1 class="header-title">통신·IT <span>AI</span> 브리핑</h1>
      </div>
      <div class="header-meta">
        <div class="date-badge" id="dateDisplay">—</div>
        <div class="time-badge" id="generatedAt">—</div>
        <button class="refresh-btn" onclick="loadBriefing()">↺ 새로고침</button>
      </div>
    </div>
    <div class="keyword-row" id="keywordBar"></div>
  </div>

  <!-- 01 통신업계 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">1</div>
      <h2 class="card-title">통신업계 주요 동향</h2>
    </div>
    <table class="telco-table">
      <thead>
        <tr>
          <th style="width:64px;">구분</th>
          <th class="lgu">LG유플러스</th>
          <th class="kt">KT</th>
          <th class="skt">SKT</th>
        </tr>
      </thead>
      <tbody id="telcoBody"></tbody>
    </table>
  </div>

  <!-- 02 뉴스 요약 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">2</div>
      <h2 class="card-title">오늘 뉴스 흐름 요약</h2>
    </div>
    <div class="summary-list" id="summaryList"></div>
  </div>

  <!-- 03 기업 동향 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">3</div>
      <h2 class="card-title">주요 기업 동향 (품질 · AI)</h2>
    </div>
    <div class="company-grid">
      <div class="cg-head">기업</div>
      <div class="cg-head">품질 동향</div>
      <div class="cg-head">AI 동향</div>
      <div id="companyRows" style="display:contents;"></div>
    </div>
  </div>

  <!-- 04 품질 사고 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">4</div>
      <h2 class="card-title">품질 사고 및 개선 사례</h2>
    </div>
    <div class="quality-grid">
      <div class="qg-head">유형</div>
      <div class="qg-head">기업/기관</div>
      <div class="qg-head">내용 요약</div>
      <div id="qualityRows" style="display:contents;"></div>
    </div>
  </div>

  <!-- 05 AI 동향 뉴스 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">5</div>
      <h2 class="card-title">AI 동향 뉴스</h2>
    </div>
    <div class="ai-news-list" id="aiNewsGrid"></div>
  </div>

  <div class="report-footer">Generated by Claude AI · 매일 오전 09:00 KST 자동 갱신</div>

</div>

<script>
const badgeMap = {
  '품질개선': 'badge-improve',
  '보안사고': 'badge-security',
  '장애사고': 'badge-failure',
  '해당없음': 'badge-none',
};

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTelco(telco) {
  const tbody = document.getElementById('telcoBody');
  ['품질','AI','신사업'].forEach(row => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td class="row-label">${esc(row)}</td>` +
      ['LGU','KT','SKT'].map(co => {
        const val = telco[co]?.[row] || '관련 동향 없음';
        const isEmpty = val === '관련 동향 없음' || val === '정보 없음';
        return `<td>${isEmpty ? `<span class="none-cell">${esc(val)}</span>` : esc(val)}</td>`;
      }).join('');
    tbody.appendChild(tr);
  });
}

function renderSummary(summary) {
  const list = document.getElementById('summaryList');
  summary.forEach(text => {
    list.innerHTML += `
      <div class="summary-item">
        <div class="summary-dot"></div>
        <p class="summary-text">${esc(text)}</p>
      </div>`;
  });
}

function renderCompanies(companies) {
  const wrap = document.getElementById('companyRows');
  companies.forEach(c => {
    const q = c.quality || c.one_line || '해당없음';
    const a = c.ai || '해당없음';
    wrap.innerHTML += `
      <div class="cg-name">${esc(c.name)}</div>
      <div class="cg-cell">${esc(q)}</div>
      <div class="cg-cell">${esc(a)}</div>`;
  });
}

function renderQuality(quality) {
  const wrap = document.getElementById('qualityRows');
  quality.forEach(q => {
    const cls = badgeMap[q.type] || 'badge-none';
    wrap.innerHTML += `
      <div class="qg-type"><span class="badge ${cls}">${esc(q.type)}</span></div>
      <div class="qg-company">${esc(q.company)}</div>
      <div class="qg-desc">${esc(q.desc)}</div>`;
  });
}

function renderAiNews(news) {
  const grid = document.getElementById('aiNewsGrid');
  news.forEach(item => {
    const bullets = (item.bullets || [])
      .map(b => `<div class="ai-card-bullet">${esc(b)}</div>`)
      .join('');
    const hasUrl = item.url && item.url.startsWith('http');
    const tag = hasUrl ? 'a' : 'div';
    const attrs = hasUrl ? `href="${esc(item.url)}" target="_blank" rel="noopener"` : '';
    const arrow = hasUrl ? '<div class="ai-card-arrow">›</div>' : '';
    grid.innerHTML += `
      <${tag} class="ai-card${hasUrl ? ' has-url' : ''}" ${attrs}>
        <div class="ai-card-inner">
          <div class="ai-card-content">
            <div class="ai-card-title">${esc(item.title)}</div>
            <div class="ai-card-bullets">${bullets}</div>
            <div class="ai-card-source">${esc(item.source)}</div>
          </div>
          ${arrow}
        </div>
      </${tag}>`;
  });
}

function renderKeywords(keywords) {
  const bar = document.getElementById('keywordBar');
  keywords.forEach(kw => {
    const pill = document.createElement('span');
    pill.className = 'kw-pill';
    pill.textContent = kw;
    bar.appendChild(pill);
  });
}

async function loadBriefing() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('report').classList.remove('visible');
  ['telcoBody','summaryList','companyRows','qualityRows','aiNewsGrid','keywordBar']
    .forEach(id => { document.getElementById(id).innerHTML = ''; });

  try {
    const resp = await fetch('/api/briefing');
    if (resp.status === 202) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('report').classList.add('visible');
      document.getElementById('generatingNotice').style.display = 'block';
      setTimeout(loadBriefing, 8000);
      return;
    }
    const data = await resp.json();
    document.getElementById('dateDisplay').textContent = data.date || '';
    document.getElementById('generatedAt').textContent = data.generated_at
      ? new Date(data.generated_at).toLocaleString('ko-KR', {hour:'2-digit', minute:'2-digit'}) + ' 기준'
      : '';
    renderKeywords(data.keywords || []);
    renderTelco(data.telco || {});
    renderSummary(data.summary || []);
    renderCompanies(data.companies || []);
    renderQuality(data.quality || []);
    renderAiNews(data.ai_news || []);
  } catch(e) { console.error(e); }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('report').classList.add('visible');
}

loadBriefing();
</script>
</body>
</html>
