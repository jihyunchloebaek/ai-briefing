<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily News | LG유플러스 품질혁신센터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7;
  --card: #ffffff;
  --border: #e5e5e7;
  --accent: #0071e3;
  --accent-soft: #e8f1fb;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --green-soft: #e9f8ee;
  --green-text: #1a7d35;
  --orange-soft: #fff4e5;
  --orange-text: #a05500;
  --red-soft: #fff0ef;
  --red-text: #b0140c;
  --lgu: #e8007d;
  --kt: #e1001e;
  --skt: #e2007c;
  --r: 14px;
  --r-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }

body {
  background: var(--bg);
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text);
  padding: 16px 14px 60px;
  font-size: 15px;
}

/* ── LOADING ── */
#loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 85vh; gap: 14px;
}
.spinner {
  width: 32px; height: 32px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#loading p { font-size: 13px; color: var(--text3); }

/* ── LAYOUT ── */
.report { max-width: 720px; margin: 0 auto; display: none; flex-direction: column; gap: 10px; }
.report.visible { display: flex; animation: up .3s ease both; }
@keyframes up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ── HEADER ── */
.header {
  background: var(--card);
  border-radius: var(--r);
  padding: 24px 20px 18px;
}
.header-eyebrow {
  font-size: 11px; font-weight: 500;
  color: var(--accent); letter-spacing: .06em;
  text-transform: uppercase; margin-bottom: 8px;
}
.header-title {
  font-size: 26px; font-weight: 700;
  letter-spacing: -.03em; line-height: 1.1;
  margin-bottom: 4px;
}
.header-title span { color: var(--accent); }
.header-sub {
  display: flex; justify-content: space-between;
  align-items: center; margin-top: 14px;
  padding-top: 14px; border-top: 1px solid var(--border);
  flex-wrap: wrap; gap: 8px;
}
.date-text { font-size: 13px; font-weight: 500; color: var(--text); }
.time-text { font-size: 12px; color: var(--text3); }
.refresh-btn {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  font-family: inherit; transition: all .15s;
}
.refresh-btn:hover { background: var(--border); }

/* ── KEYWORDS ── */
.keywords {
  display: flex; gap: 6px; flex-wrap: wrap;
  margin-top: 14px;
}
.kw {
  font-size: 12px; font-weight: 500;
  color: var(--accent); background: var(--accent-soft);
  padding: 4px 11px; border-radius: 20px;
}

/* ── GENERATING ── */
.gen-notice {
  background: var(--accent-soft); border-radius: var(--r-sm);
  padding: 14px 18px; font-size: 13px;
  color: var(--accent); font-weight: 500;
  text-align: center; display: none;
}

/* ── SECTION CARD ── */
.card { background: var(--card); border-radius: var(--r); overflow: hidden; }
.card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.card-num {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--accent-soft); color: var(--accent);
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.card-title { font-size: 15px; font-weight: 600; letter-spacing: -.02em; }

/* ── TELCO: 모바일에서 탭 방식 ── */
.telco-tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.telco-tab {
  flex: 1; padding: 10px 6px; font-size: 13px; font-weight: 600;
  text-align: center; cursor: pointer; color: var(--text2);
  border-bottom: 2.5px solid transparent;
  transition: all .15s; letter-spacing: -.01em;
}
.telco-tab.active-lgu { color: var(--lgu); border-color: var(--lgu); }
.telco-tab.active-kt  { color: var(--kt);  border-color: var(--kt);  }
.telco-tab.active-skt { color: var(--skt); border-color: var(--skt); }
.telco-panel { display: none; padding: 4px 0; }
.telco-panel.active { display: block; }
.telco-row {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 13px 20px; border-bottom: 1px solid var(--border);
}
.telco-row:last-child { border-bottom: none; }
.telco-label {
  font-size: 11px; font-weight: 600; color: var(--text2);
  min-width: 38px; padding-top: 2px; letter-spacing: .01em;
}
.telco-val { font-size: 14px; line-height: 1.6; color: var(--text); flex: 1; }
.telco-val.empty { color: var(--text3); font-style: italic; font-size: 13px; }
.telco-link {
  font-size: 14px; line-height: 1.6; flex: 1;
  color: var(--accent); text-decoration: none;
  display: flex; align-items: flex-start; gap: 4px;
}
.telco-link:hover { text-decoration: underline; }
.telco-arrow { font-size: 11px; flex-shrink: 0; margin-top: 3px; }

/* ── SUMMARY ── */
.summary-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
}
.summary-item:last-child { border-bottom: none; }
.dot {
  width: 7px; height: 7px; background: var(--accent);
  border-radius: 50%; flex-shrink: 0; margin-top: 6px;
}
.summary-text { font-size: 14px; line-height: 1.7; color: var(--text); }

/* ── COMPANIES 아이콘 카드 ── */
.company-item {
  display: flex; gap: 14px; align-items: flex-start;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  text-decoration: none; color: inherit;
  transition: background .12s;
}
.company-item:last-child { border-bottom: none; }
.company-item:hover { background: var(--bg); }
.company-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  background: var(--bg);
}
.company-content { flex: 1; min-width: 0; }
.company-name {
  font-size: 14px; font-weight: 700;
  letter-spacing: -.02em; margin-bottom: 5px;
  display: flex; align-items: center; gap: 6px;
}
.company-name .link-arrow {
  font-size: 13px; color: var(--accent);
  opacity: 0; transition: opacity .15s;
}
.company-item:hover .link-arrow { opacity: 1; }
.company-summary {
  font-size: 13.5px; line-height: 1.65;
  color: var(--text2); letter-spacing: -.01em;
}

/* ── QUALITY ── */
.quality-item {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 6px;
}
.quality-item:last-child { border-bottom: none; }
.quality-top { display: flex; align-items: center; gap: 8px; }
.badge {
  font-size: 11px; font-weight: 500;
  padding: 3px 9px; border-radius: 20px; white-space: nowrap;
}
.badge-improve  { background: var(--green-soft);  color: var(--green-text); }
.badge-security { background: var(--orange-soft); color: var(--orange-text); }
.badge-failure  { background: var(--red-soft);    color: var(--red-text); }
.badge-none     { background: var(--bg);          color: var(--text3); }
.quality-company { font-size: 14px; font-weight: 600; letter-spacing: -.01em; }
.quality-desc { font-size: 13.5px; line-height: 1.65; color: var(--text2); }

/* ── AI NEWS ── */
.ai-card {
  display: block; padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  text-decoration: none; color: inherit;
  transition: background .12s;
}
.ai-card:last-child { border-bottom: none; }
.ai-card:hover { background: var(--bg); }
.ai-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.ai-card-title {
  font-size: 14.5px; font-weight: 600;
  line-height: 1.45; letter-spacing: -.02em;
  color: var(--text); margin-bottom: 10px; flex: 1;
}
.ai-card.has-url .ai-card-title {
  color: var(--accent);
  text-decoration: underline;
  text-decoration-color: rgba(0,113,227,0.3);
  text-underline-offset: 3px;
}
.ai-arrow { font-size: 20px; color: var(--text3); flex-shrink: 0; line-height: 1.2; transition: transform .15s; }
.ai-card.has-url:hover .ai-arrow { transform: translateX(3px); color: var(--accent); }
.ai-bullets { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.ai-bullet { font-size: 13px; line-height: 1.65; color: var(--text2); }
.ai-source {
  font-size: 11.5px; font-weight: 500; color: var(--text3);
  display: flex; align-items: center; gap: 4px;
}
.ai-source::before { content: 'from.'; color: var(--accent); font-weight: 600; }

/* ── 메인 탭 ── */
.main-tabs {
  display: flex; gap: 0;
  background: var(--card);
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--border);
}
.main-tab {
  flex: 1; padding: 13px 10px;
  font-size: 14px; font-weight: 600;
  text-align: center; cursor: pointer;
  color: var(--text2); background: transparent;
  border: none; font-family: inherit;
  border-bottom: 2.5px solid transparent;
  transition: all .15s; letter-spacing: -.01em;
}
.main-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--accent-soft);
}
.tab-section { display: none; }
.tab-section.active { display: flex; flex-direction: column; gap: 10px; }

/* ── 장애 모니터 ── */
.monitor-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px; padding: 16px 20px;
}
.monitor-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: var(--r-sm);
  background: var(--bg);
}
.monitor-emoji { font-size: 20px; flex-shrink: 0; }
.monitor-info { flex: 1; min-width: 0; }
.monitor-name { font-size: 13px; font-weight: 600; letter-spacing: -.01em; }
.monitor-status {
  font-size: 11px; font-weight: 500; margin-top: 2px;
}
.status-normal { color: var(--green-text); }
.status-down { color: var(--red-text); }
.monitor-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.dot-normal { background: #34c759; }
.dot-down { background: #ff3b30; animation: pulse .8s ease infinite alternate; }
@keyframes pulse { from { opacity: 1; } to { opacity: 0.3; } }
.monitor-checked {
  font-size: 11px; color: var(--text3);
  text-align: center; padding: 0 20px 14px;
}
.monitor-articles {
  padding: 0 20px 14px;
}
.monitor-article-item {
  padding: 10px 0; border-top: 1px solid var(--border);
  font-size: 13px;
}
.monitor-article-company { font-weight: 600; color: var(--red-text); margin-bottom: 4px; }
.monitor-article-title { color: var(--text2); line-height: 1.5; }
.monitor-article-title a { color: var(--accent); text-decoration: none; }
.monitor-article-title a:hover { text-decoration: underline; }

/* ── FOOTER ── */
.footer {
  text-align: center; font-size: 11px;
  color: var(--text3); padding: 6px;
}

@media(min-width: 640px) {
  body { padding: 28px 20px 60px; }
  .header { padding: 32px 28px 22px; }
  .header-title { font-size: 32px; }
  .card-header { padding: 20px 28px 16px; }
  .telco-row, .summary-item, .quality-item, .ai-card, .company-item { padding-left: 28px; padding-right: 28px; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>브리핑 불러오는 중…</p>
</div>

<div class="report" id="report">



  <!-- HEADER -->
  <div class="header">
    <div class="header-eyebrow">LG유플러스 품질혁신센터</div>
    <h1 class="header-title">AI Daily <span>News</span></h1>
  <div class="header-sub">
      <div>
        <div class="date-text" id="dateDisplay">—</div>
        <div class="time-text" id="generatedAt">—</div>
      </div>
      <button class="refresh-btn" onclick="loadBriefing()">↺ 새로고침</button>
  </div>
  <div class="keywords" id="keywordBar"></div>
  <div class="gen-notice" id="genNotice"></div>
</div>

  <!-- 메인 탭 버튼 -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMainTab('briefing')">📰 뉴스 브리핑</button>
    <button class="main-tab" onclick="switchMainTab('monitor')" id="monitorTab">🚨 장애 모니터</button>
  </div>

  <!-- 브리핑 섹션 -->
  <div class="tab-section active" id="section-briefing">

  <!-- 01 통신업계 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">1</div>
      <h2 class="card-title">통신업계 주요 동향</h2>
    </div>
    <div class="telco-tabs">
      <div class="telco-tab" id="tab-LGU" onclick="switchTab('LGU')">LG유플러스</div>
      <div class="telco-tab" id="tab-KT"  onclick="switchTab('KT')">KT</div>
      <div class="telco-tab" id="tab-SKT" onclick="switchTab('SKT')">SKT</div>
    </div>
    <div id="panel-LGU" class="telco-panel"></div>
    <div id="panel-KT"  class="telco-panel"></div>
    <div id="panel-SKT" class="telco-panel"></div>
  </div>

  <!-- 02 뉴스 요약 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">2</div>
      <h2 class="card-title">오늘 뉴스 흐름 요약</h2>
    </div>
    <div id="summaryList"></div>
  </div>

  <!-- 03 기업 동향 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">3</div>
      <h2 class="card-title">주요 기업 동향</h2>
    </div>
    <div id="companyList"></div>
  </div>

  <!-- 04 품질 사고 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">4</div>
      <h2 class="card-title">품질 사고 및 개선 사례</h2>
    </div>
    <div id="qualityList"></div>
  </div>

  <!-- 05 AI 동향 뉴스 -->
  <div class="card">
    <div class="card-header">
      <div class="card-num">5</div>
      <h2 class="card-title">AI 동향 뉴스</h2>
    </div>
    <div id="aiNewsList"></div>
  </div>

  <div class="footer">LG유플러스 품질혁신센터 · Generated by Claude AI · 매주 월요일 오전 09:00 KST 자동 갱신</div>

  </div><!-- /section-briefing -->

  <!-- 장애 모니터 섹션 -->
  <div class="tab-section" id="section-monitor">
    <div class="card">
      <div class="card-header">
        <div class="card-num">🚨</div>
        <h2 class="card-title">실시간 서비스 장애 모니터</h2>
      </div>
      <div class="monitor-grid" id="monitorGrid">
        <div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--text3); font-size:13px;">모니터링 데이터 로딩 중...</div>
      </div>
      <div class="monitor-checked" id="monitorChecked"></div>
    </div>
    <div class="card" id="monitorArticlesCard" style="display:none;">
      <div class="card-header">
        <div class="card-num">!</div>
        <h2 class="card-title">감지된 장애 기사</h2>
      </div>
      <div class="monitor-articles" id="monitorArticles"></div>
    </div>
    <div class="footer">네이버 뉴스 API 기반 · 30분마다 자동 갱신 · 1시간 이내 기사 기준</div>
  </div><!-- /section-monitor -->

</div>

<script>
const badgeMap = {
  '품질개선':'badge-improve','보안사고':'badge-security',
  '장애사고':'badge-failure','해당없음':'badge-none'
};

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── TELCO 탭 ── */
let telcoData = {};
function switchTab(co) {
  ['LGU','KT','SKT'].forEach(c => {
    const tab = document.getElementById('tab-'+c);
    const panel = document.getElementById('panel-'+c);
    const activeClass = 'active-'+c.toLowerCase();
    tab.classList.remove('active-lgu','active-kt','active-skt');
    panel.classList.remove('active');
  });
  document.getElementById('tab-'+co).classList.add('active-'+co.toLowerCase());
  document.getElementById('panel-'+co).classList.add('active');
}

function renderTelco(telco) {
  telcoData = telco;
  ['LGU','KT','SKT'].forEach(co => {
    const panel = document.getElementById('panel-'+co);
    const data = telco[co] || {};
    panel.innerHTML = ['품질','AI','신사업'].map(row => {
      const val = data[row] || '관련 동향 없음';
      const isEmpty = val === '관련 동향 없음' || val === '정보 없음';
      return `<div class="telco-row">
        <div class="telco-label">${esc(row)}</div>
        <div class="telco-val${isEmpty?' empty':''}">${esc(val)}</div>
      </div>`;
    }).join('');
  });
  switchTab('LGU');
}

/* ── SUMMARY ── */
function renderSummary(summary) {
  document.getElementById('summaryList').innerHTML =
    (summary||[]).map(text => `
      <div class="summary-item">
        <div class="dot"></div>
        <p class="summary-text">${esc(text)}</p>
      </div>`).join('');
}

/* ── COMPANIES 아이콘 매핑 ── */
const companyIcons = {
  '네이버': '🟢', '카카오': '🟡', '현대차': '🚗', '현대': '🚗',
  '삼성': '📱', '삼성전자': '📱', 'LG': '⚡', 'LG전자': '⚡',
  '쿠팡': '📦', 'SK': '🔷', 'SK텔레콤': '🔷', 'SKT': '🔷',
  'KT': '🔴', 'LG유플러스': '💜', 'LGU+': '💜',
  '카카오페이': '💛', '토스': '💙', '배달의민족': '🛵',
  '당근': '🥕', '당근마켓': '🥕', '라인': '💚', '라인플러스': '💚',
  '구글': '🔍', 'Google': '🔍', '애플': '🍎', 'Apple': '🍎',
  '마이크로소프트': '🪟', 'Microsoft': '🪟', 'MS': '🪟',
  '메타': '🔵', 'Meta': '🔵', '아마존': '📦', 'Amazon': '📦',
  '엔비디아': '🟩', 'NVIDIA': '🟩', 'OpenAI': '⚫',
  '시장 전반': '📊', '시장': '📊',
};

function getIcon(name) {
  for (const [key, icon] of Object.entries(companyIcons)) {
    if (name.includes(key)) return icon;
  }
  return '🏢';
}

function renderCompanies(companies) {
  document.getElementById('companyList').innerHTML =
    (companies||[]).map(c => {
      const icon = getIcon(c.name);
      const summary = c.summary || c.one_line || '';
      const hasUrl = c.url && c.url.startsWith('http');
      const tag = hasUrl ? 'a' : 'div';
      const attrs = hasUrl ? `href="${esc(c.url)}" target="_blank" rel="noopener"` : '';
      const arrow = hasUrl ? '<span class="link-arrow">↗</span>' : '';
      return `
        <${tag} class="company-item" ${attrs}>
          <div class="company-icon">${icon}</div>
          <div class="company-content">
            <div class="company-name">${esc(c.name)}${arrow}</div>
            <div class="company-summary">${esc(summary)}</div>
          </div>
        </${tag}>`;
    }).join('');
}

/* ── QUALITY ── */
function renderQuality(quality) {
  document.getElementById('qualityList').innerHTML =
    (quality||[]).map(q => {
      const cls = badgeMap[q.type] || 'badge-none';
      return `
        <div class="quality-item">
          <div class="quality-top">
            <span class="badge ${cls}">${esc(q.type)}</span>
            <span class="quality-company">${esc(q.company)}</span>
          </div>
          <div class="quality-desc">${esc(q.desc)}</div>
        </div>`;
    }).join('');
}

/* ── AI NEWS ── */
function renderAiNews(news) {
  document.getElementById('aiNewsList').innerHTML =
    (news||[]).map(item => {
      const hasUrl = item.url && item.url.startsWith('http');
      const tag = hasUrl ? 'a' : 'div';
      const attrs = hasUrl ? `href="${esc(item.url)}" target="_blank" rel="noopener"` : '';
      const arrow = hasUrl ? '<div class="ai-arrow">›</div>' : '';
      const bullets = (item.bullets||[]).map(b =>
        `<div class="ai-bullet">${esc(b)}</div>`).join('');
      return `
        <${tag} class="ai-card${hasUrl?' has-url':''}" ${attrs}>
          <div class="ai-card-top">
            <div class="ai-card-title">${esc(item.title)}</div>
            ${arrow}
          </div>
          <div class="ai-bullets">${bullets}</div>
          <div class="ai-source">${esc(item.source)}</div>
        </${tag}>`;
    }).join('');
}

/* ── KEYWORDS ── */
function renderKeywords(keywords) {
  document.getElementById('keywordBar').innerHTML =
    (keywords||[]).map(kw => `<span class="kw">${esc(kw)}</span>`).join('');
}

/* ── LOAD ── */
async function loadBriefing() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('report').classList.remove('visible');
  document.getElementById('genNotice').style.display = 'none';

  try {
    const resp = await fetch('/api/briefing');
    if (resp.status === 202) {
      const payload = await resp.json();
      const notice = document.getElementById('genNotice');
      notice.textContent = payload.last_error
        ? `브리핑 생성이 지연되고 있어요. 최근 오류: ${payload.last_error}`
        : (payload.message || '브리핑 생성 중입니다. 잠시 후 자동으로 다시 시도합니다.');
      notice.style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.getElementById('report').classList.add('visible');
      setTimeout(loadBriefing, 8000);
      return;
    }
    const data = await resp.json();
    document.getElementById('dateDisplay').textContent = data.date || '';
    document.getElementById('generatedAt').textContent = data.generated_at
      ? new Date(data.generated_at).toLocaleString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 기준'
      : '';
    renderKeywords(data.keywords||[]);
    renderTelco(data.telco||{});
    renderSummary(data.summary||[]);
    renderCompanies(data.companies||[]);
    renderQuality(data.quality||[]);
    renderAiNews(data.ai_news||[]);
  } catch(e) { console.error(e); }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('report').classList.add('visible');
}

loadBriefing();

/* ── 메인 탭 전환 ── */
function switchMainTab(tab) {
  ['briefing','monitor'].forEach(t => {
    document.getElementById('section-'+t).classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.main-tab').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'briefing') || (i === 1 && tab === 'monitor'));
  });
  if (tab === 'monitor') loadMonitor();
}

/* ── 장애 모니터 ── */
async function loadMonitor() {
  try {
    const resp = await fetch('/api/monitor');
    if (resp.status === 202) {
      document.getElementById('monitorChecked').textContent = '모니터링 중...';
      return;
    }
    const data = await resp.json();
    const results = data.results || [];

    document.getElementById('monitorGrid').innerHTML = results.map(r => `
      <div class="monitor-item">
        <div class="monitor-emoji">${esc(r.emoji)}</div>
        <div class="monitor-info">
          <div class="monitor-name">${esc(r.name)}</div>
          <div class="monitor-status ${r.status === 'down' ? 'status-down' : 'status-normal'}">
            ${r.status === 'down' ? '⚠ 장애 감지' : '정상'}
          </div>
        </div>
        <div class="monitor-dot ${r.status === 'down' ? 'dot-down' : 'dot-normal'}"></div>
      </div>`).join('');

    if (data.checked_at) {
      const d = new Date(data.checked_at);
      document.getElementById('monitorChecked').textContent =
        '마지막 확인: ' + d.toLocaleString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    }

    const downItems = results.filter(r => r.status === 'down' && r.articles.length > 0);
    const card = document.getElementById('monitorArticlesCard');
    if (downItems.length > 0) {
      card.style.display = 'block';
      document.getElementById('monitorArticles').innerHTML = downItems.map(r =>
        r.articles.map(a => `
          <div class="monitor-article-item">
            <div class="monitor-article-company">${esc(r.emoji)} ${esc(r.name)}</div>
            <div class="monitor-article-title">
              ${a.link ? `<a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a>` : esc(a.title)}
            </div>
          </div>`).join('')
      ).join('');
    } else {
      card.style.display = 'none';
    }
  } catch(e) { console.error(e); }
}
</script>
